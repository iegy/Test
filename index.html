
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة مهامي والتقويم • المتكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.75);
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.6);
            --item-bg: rgba(15, 23, 42, 0.4);
            --item-hover: rgba(15, 23, 42, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --filter-bg: rgba(15, 23, 42, 0.3);
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --accent-blue: #3b82f6;
            --cat-work: #a855f7;
            --cat-personal: #ec4899;
            --cat-study: #06b6d4;
            --cat-shopping: #eab308;
        }
        body.light-mode {
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(255, 255, 255, 0.9);
            --item-bg: rgba(255, 255, 255, 0.6);
            --item-hover: rgba(255, 255, 255, 1);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --filter-bg: rgba(241, 245, 249, 0.8);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 20px 20px;
            transition: background 0.5s ease;
        }
        .app-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            align-items: start;
            flex: 1;
        }
        .pomodoro-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 25px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.4s ease;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 25px;
        }
        .timer-display {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text-main);
            min-width: 160px;
            text-align: center;
            background: var(--input-bg);
            border-radius: 20px;
            padding: 10px 20px;
            border: 1px solid var(--border-color);
        }
        .timer-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .timer-btn {
            background: var(--filter-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .timer-btn:hover {
            background: var(--border-color);
            transform: translateY(-2px);
        }
        .timer-btn.primary {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        .timer-btn.primary:hover {
            background: var(--primary-hover);
        }
        .session-badge {
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            background: var(--filter-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .session-badge.work {
            color: var(--accent-orange);
            border-color: var(--accent-orange);
        }
        .session-badge.break {
            color: var(--accent-green);
            border-color: var(--accent-green);
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .todo-container,
        .calendar-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeInContainer 0.8s ease-out;
            transition: all 0.4s ease;
            position: relative;
            width: 100%;
        }
        .theme-toggle {
            position: absolute;
            top: 25px;
            left: 25px;
            background: var(--filter-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
        }
        header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }
        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to left, var(--primary-color), #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .input-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .input-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
        }
        .todo-input,
        select,
        input[type="date"] {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 100%;
        }
        .todo-input:focus,
        select:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }
        select option {
            background: var(--card-bg);
            color: var(--text-main);
        }
        body:not(.light-mode) input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        .add-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .add-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            background: var(--filter-bg);
            padding: 15px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
        }
        .filters {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .filter-btn.active,
        .filter-btn:hover {
            background: var(--border-color);
            color: var(--text-main);
            border-color: var(--text-main);
        }
        .category-filter-select {
            width: 100%;
            max-width: 200px;
            margin: 0 auto;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 20px;
            text-align: center;
        }
        .stats-area {
            margin-bottom: 20px;
        }
        .stats-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            flex-wrap: wrap;
            gap: 10px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--accent-green);
            width: 0%;
            transition: width 0.5s ease-out;
        }
        .action-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .text-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 6px;
        }
        .text-btn:hover {
            opacity: 0.8;
            background: var(--border-color);
        }
        .clear-btn {
            color: var(--accent-red);
        }
        .export-btn {
            color: var(--primary-color);
        }
        .export-json-btn {
            color: var(--cat-work);
        }
        .import-btn {
            color: var(--accent-green);
        }
        .task-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
            margin-top: 10px;
        }
        .task-list::-webkit-scrollbar {
            width: 6px;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        .task-item {
            background: var(--item-bg);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out forwards;
            border-right: 4px solid transparent;
            cursor: move;
            user-select: none;
        }
        .task-item.dragging {
            opacity: 0.4;
            background: rgba(99, 102, 241, 0.1);
            border: 2px dashed var(--primary-color);
        }
        .task-item:hover:not(.dragging) {
            transform: translateX(-3px);
            background: var(--item-hover);
        }
        .priority-high {
            border-right-color: var(--accent-red);
        }
        .priority-medium {
            border-right-color: var(--accent-orange);
        }
        .priority-low {
            border-right-color: var(--accent-blue);
        }
        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .task-text {
            font-size: 1.05rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            word-break: break-word;
            margin-bottom: 6px;
        }
        .task-text::before {
            content: '\f0c8';
            font-family: 'Font Awesome 5 Free';
            font-weight: 400;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
        }
        .task-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            padding-right: 25px;
        }
        .task-date i {
            margin-left: 4px;
            color: var(--primary-color);
        }
        .cat-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #fff;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .badge-work {
            background: var(--cat-work);
        }
        .badge-personal {
            background: var(--cat-personal);
        }
        .badge-study {
            background: var(--cat-study);
        }
        .badge-shopping {
            background: var(--cat-shopping);
        }
        .task-item.completed {
            opacity: 0.6;
            background: rgba(16, 185, 129, 0.05);
            border-right-color: var(--accent-green);
        }
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .task-item.completed .task-text::before {
            content: '\f14a';
            font-weight: 900;
            color: var(--accent-green);
        }
        .action-btns {
            display: flex;
            gap: 5px;
        }
        .action-btn {
            background: transparent;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            color: var(--text-muted);
        }
        .edit-btn:hover {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
        }
        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
        }
        .empty-state {
            text-align: center;
            padding: 25px 0;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }
        .calendar-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }
        .calendar-header-top h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }
        .cal-nav-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cal-nav-btn:hover {
            background: var(--border-color);
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .day-name {
            text-align: center;
            font-weight: bold;
            padding: 10px 0;
            background: var(--filter-bg);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .day-cell {
            min-height: 100px;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--item-bg);
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: all 0.3s ease;
        }
        .day-cell:hover:not(.empty) {
            background: var(--item-hover);
        }
        .day-cell.empty {
            background: transparent;
            border: none;
        }
        .day-cell.today {
            border: 2px solid var(--primary-color);
            background: rgba(99, 102, 241, 0.05);
        }
        .day-number {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .day-cell.today .day-number {
            color: var(--primary-color);
        }
        .calendar-task {
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            font-weight: 500;
            opacity: 0.9;
        }
        .calendar-task:hover {
            opacity: 1;
            transform: scale(1.02);
        }
        .calendar-task.completed {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .footer-container {
            margin-top: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
        }
        .footer-container span {
            color: var(--accent-red);
            font-size: 1.1rem;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeIn 0.25s ease;
        }
        .modal-box {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px 28px 24px;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: modalPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
        }
        .modal-icon.info {
            color: var(--accent-blue);
        }
        .modal-icon.warning {
            color: var(--accent-orange);
        }
        .modal-icon.success {
            color: var(--accent-green);
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .modal-message {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .modal-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 1rem;
            margin-bottom: 18px;
            text-align: center;
            transition: 0.2s;
        }
        .modal-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .modal-btn {
            padding: 10px 22px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.25s;
            min-width: 90px;
        }
        .modal-btn.primary {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }
        .modal-btn.primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
        .modal-btn.secondary {
            background: transparent;
            border-color: var(--border-color);
            color: var(--text-main);
        }
        .modal-btn.secondary:hover {
            background: var(--border-color);
        }
        .modal-btn.danger {
            background: var(--accent-red);
            color: #fff;
            border-color: var(--accent-red);
        }
        .modal-btn.danger:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.85) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes fadeInContainer {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: scale(0.9); }
        }
        @media(max-width: 950px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        @media(max-width: 550px) {
            .input-row-2 {
                grid-template-columns: 1fr 1fr;
            }
            .add-btn {
                grid-column: span 2;
                padding: 12px;
            }
            header {
                margin-top: 20px;
            }
            .action-links {
                justify-content: center;
            }
            .pomodoro-container {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- مؤقت بودورو -->
        <div class="pomodoro-container" id="pomodoroContainer">
            <div class="session-badge work" id="sessionBadge">
                <i class="fas fa-brain"></i> جلسة عمل
            </div>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button class="timer-btn primary" id="startPauseBtn"><i class="fas fa-play"></i> ابدأ</button>
                <button class="timer-btn" id="resetBtn"><i class="fas fa-redo"></i> إعادة</button>
                <button class="timer-btn" id="skipBtn"><i class="fas fa-forward"></i> تخطي</button>
            </div>
        </div>

        <!-- صف المهام والتقويم -->
        <div class="main-grid">
            <div class="todo-container">
                <button id="themeToggle" class="theme-toggle" title="تغيير المظهر">
                    <i class="fas fa-moon"></i>
                </button>
                <header>
                    <h1>مهامي اليومية</h1>
                    <p>نظّم وقتك وأنجز أهدافك بذكاء</p>
                </header>
                <div class="input-section">
                    <input type="text" id="taskInput" class="todo-input" placeholder="اكتب مهمتك الجديدة هنا..." autocomplete="off">
                </div>
                <div class="input-row-2">
                    <select id="taskCategory" title="التصنيف">
                        <option value="work">💼 عمل</option>
                        <option value="personal">👤 شخصي</option>
                        <option value="study">🎓 دراسة</option>
                        <option value="shopping">🛒 تسوق</option>
                    </select>
                    <select id="taskPriority" title="الأولوية">
                        <option value="high">🔥 عالية</option>
                        <option value="medium" selected>⚡ متوسطة</option>
                        <option value="low">🌱 عادية</option>
                    </select>
                    <input type="date" id="taskDate" title="تاريخ الانتهاء">
                    <button id="addBtn" class="add-btn"><i class="fas fa-plus"></i> إضافة</button>
                </div>
                <div class="controls-wrapper">
                    <div class="filters">
                        <button class="filter-btn active" data-filter="all">الكل</button>
                        <button class="filter-btn" data-filter="pending">قيد التنفيذ</button>
                        <button class="filter-btn" data-filter="completed">المكتملة</button>
                    </div>
                    <select id="categoryFilter" class="category-filter-select" title="فلترة حسب التصنيف">
                        <option value="all">📁 كل التصنيفات</option>
                        <option value="work">💼 عمل</option>
                        <option value="personal">👤 شخصي</option>
                        <option value="study">🎓 دراسة</option>
                        <option value="shopping">🛒 تسوق</option>
                    </select>
                </div>
                <div class="stats-area">
                    <div class="stats-container">
                        <span id="taskCount">المهام: 0</span>
                        <span id="progressText">0%</span>
                        <div class="action-links">
                            <input type="file" id="importJsonInput" accept=".json" style="display: none;">
                            <button class="text-btn import-btn" id="importJsonBtn" title="استيراد مهام من ملف JSON"><i class="fas fa-file-import"></i> استيراد JSON</button>
                            <button class="text-btn export-json-btn" id="exportJsonBtn" title="تصدير المهام كملف JSON"><i class="fas fa-file-code"></i> تصدير JSON</button>
                            <button class="text-btn export-btn" id="exportBtn" title="تحميل المهام كملف نصي"><i class="fas fa-file-alt"></i> تصدير TXT</button>
                            <button class="text-btn clear-btn" id="clearCompletedBtn" style="display: none;"><i class="fas fa-broom"></i> تنظيف</button>
                        </div>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                </div>
                <ul class="task-list" id="taskList"></ul>
            </div>
            <div class="calendar-container">
                <div class="calendar-header-top">
                    <button class="cal-nav-btn" id="prevMonth"><i class="fas fa-chevron-right"></i> السابق</button>
                    <h2 id="monthYearText">أبريل 2024</h2>
                    <button class="cal-nav-btn" id="nextMonth">التالي <i class="fas fa-chevron-left"></i></button>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <div class="day-name">الأحد</div>
                    <div class="day-name">الإثنين</div>
                    <div class="day-name">الثلاثاء</div>
                    <div class="day-name">الأربعاء</div>
                    <div class="day-name">الخميس</div>
                    <div class="day-name">الجمعة</div>
                    <div class="day-name">السبت</div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer-container">
        made with <span>♥️</span> by mohammed Hussein 2026
    </div>
    <script>
        (function() {
            // --- عناصر المهام والتقويم ---
            const taskInput = document.getElementById('taskInput');
            const taskDate = document.getElementById('taskDate');
            const taskPriority = document.getElementById('taskPriority');
            const taskCategory = document.getElementById('taskCategory');
            const addBtn = document.getElementById('addBtn');
            const taskList = document.getElementById('taskList');
            const taskCount = document.getElementById('taskCount');
            const clearCompletedBtn = document.getElementById('clearCompletedBtn');
            const exportBtn = document.getElementById('exportBtn');
            const exportJsonBtn = document.getElementById('exportJsonBtn');
            const importJsonBtn = document.getElementById('importJsonBtn');
            const importJsonInput = document.getElementById('importJsonInput');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const categoryFilter = document.getElementById('categoryFilter');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const themeToggle = document.getElementById('themeToggle');
            const calendarGrid = document.getElementById('calendarGrid');
            const monthYearText = document.getElementById('monthYearText');
            const prevMonthBtn = document.getElementById('prevMonth');
            const nextMonthBtn = document.getElementById('nextMonth');
            
            // --- عناصر المؤقت ---
            const timerDisplay = document.getElementById('timerDisplay');
            const startPauseBtn = document.getElementById('startPauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const skipBtn = document.getElementById('skipBtn');
            const sessionBadge = document.getElementById('sessionBadge');
            
            const successSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
            successSound.volume = 0.4;
            const pomodoroAlarm = new Audio('https://assets.mixkit.co/active_storage/sfx/1995/1995-preview.mp3');
            pomodoroAlarm.volume = 0.5;

            let tasks = JSON.parse(localStorage.getItem('my_tasks_calendar')) || [];
            let currentStatusFilter = 'all';
            let currentCatFilter = 'all';
            let currentCalDate = new Date();
            let isLightMode = localStorage.getItem('theme') === 'light';
            if (isLightMode) enableLightMode();
            taskDate.valueAsDate = new Date();

            // حالة المؤقت
            let timerInterval = null;
            let timerSeconds = 25 * 60; // 25 دقيقة عمل افتراضي
            const WORK_TIME = 25 * 60;
            const BREAK_TIME = 5 * 60;
            let isWorkSession = true;
            let isTimerRunning = false;

            function updateTimerDisplay() {
                const mins = Math.floor(timerSeconds / 60);
                const secs = timerSeconds % 60;
                timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }

            function setSessionType(work) {
                isWorkSession = work;
                if (work) {
                    sessionBadge.innerHTML = '<i class="fas fa-brain"></i> جلسة عمل';
                    sessionBadge.className = 'session-badge work';
                    timerSeconds = WORK_TIME;
                } else {
                    sessionBadge.innerHTML = '<i class="fas fa-coffee"></i> استراحة';
                    sessionBadge.className = 'session-badge break';
                    timerSeconds = BREAK_TIME;
                }
                updateTimerDisplay();
            }

            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                isTimerRunning = false;
                startPauseBtn.innerHTML = '<i class="fas fa-play"></i> ابدأ';
            }

            function startTimer() {
                if (timerInterval) return;
                isTimerRunning = true;
                startPauseBtn.innerHTML = '<i class="fas fa-pause"></i> إيقاف';
                timerInterval = setInterval(() => {
                    if (timerSeconds <= 1) {
                        // انتهى الوقت
                        clearInterval(timerInterval);
                        timerInterval = null;
                        pomodoroAlarm.currentTime = 0;
                        pomodoroAlarm.play().catch(e => console.log("صوت المؤقت غير متاح"));
                        // التبديل تلقائياً بين العمل والاستراحة
                        if (isWorkSession) {
                            setSessionType(false); // استراحة
                        } else {
                            setSessionType(true); // عمل
                        }
                        // بدء الجلسة الجديدة تلقائياً بعد تغيير النوع
                        isTimerRunning = false;
                        startPauseBtn.innerHTML = '<i class="fas fa-play"></i> ابدأ';
                        updateTimerDisplay();
                        // إشعار عبر النافذة المنبثقة
                        showModal({
                            icon: isWorkSession ? 'info' : 'success',
                            title: isWorkSession ? 'انتهت الاستراحة' : 'انتهت جلسة العمل',
                            message: isWorkSession ? 'حان وقت التركيز من جديد!' : 'خذ استراحة 5 دقائق 😌',
                            confirmText: 'حسناً'
                        });
                    } else {
                        timerSeconds--;
                        updateTimerDisplay();
                    }
                }, 1000);
            }

            function pauseTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                isTimerRunning = false;
                startPauseBtn.innerHTML = '<i class="fas fa-play"></i> ابدأ';
            }

            function resetTimer() {
                stopTimer();
                setSessionType(true);
            }

            function skipSession() {
                stopTimer();
                if (isWorkSession) {
                    setSessionType(false);
                } else {
                    setSessionType(true);
                }
            }

            startPauseBtn.addEventListener('click', () => {
                if (isTimerRunning) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            });
            resetBtn.addEventListener('click', resetTimer);
            skipBtn.addEventListener('click', skipSession);

            // التهيئة الأولية للمؤقت
            setSessionType(true);
            updateTimerDisplay();

            // --- وظائف المهام والتقويم (دون تغيير جوهري) ---
            function enableLightMode() {
                document.body.classList.add('light-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun" style="color: #f59e0b;"></i>';
                localStorage.setItem('theme', 'light');
            }
            function disableLightMode() {
                document.body.classList.remove('light-mode');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                localStorage.setItem('theme', 'dark');
            }

            function showModal({ icon = 'info', title = '', message = '', input = false, inputValue = '', confirmText = 'موافق', cancelText = 'إلغاء', showCancel = false, type = 'primary' } = {}) {
                return new Promise((resolve) => {
                    const overlay = document.createElement('div');
                    overlay.className = 'modal-overlay';
                    let iconHtml = '';
                    if (icon === 'info') iconHtml = '<i class="fas fa-info-circle modal-icon info"></i>';
                    else if (icon === 'warning') iconHtml = '<i class="fas fa-exclamation-triangle modal-icon warning"></i>';
                    else if (icon === 'success') iconHtml = '<i class="fas fa-check-circle modal-icon success"></i>';
                    else if (icon === 'edit') iconHtml = '<i class="fas fa-pen modal-icon info"></i>';
                    const inputHtml = input ? `<input type="text" class="modal-input" id="modalInput" value="${escapeHtml(inputValue || '')}" autofocus>` : '';
                    const cancelBtnHtml = showCancel ? `<button class="modal-btn secondary" id="modalCancel">${cancelText}</button>` : '';
                    overlay.innerHTML = `
                        <div class="modal-box">
                            ${iconHtml}
                            <div class="modal-title">${escapeHtml(title)}</div>
                            <div class="modal-message">${escapeHtml(message)}</div>
                            ${inputHtml}
                            <div class="modal-buttons">
                                ${cancelBtnHtml}
                                <button class="modal-btn ${type === 'danger' ? 'danger' : 'primary'}" id="modalConfirm">${confirmText}</button>
                            </div>
                        </div>`;
                    document.body.appendChild(overlay);
                    const confirmBtn = overlay.querySelector('#modalConfirm');
                    const cancelBtn = overlay.querySelector('#modalCancel');
                    const inputField = overlay.querySelector('#modalInput');
                    const closeModal = (value) => {
                        overlay.style.animation = 'fadeOut 0.2s ease forwards';
                        setTimeout(() => overlay.remove(), 200);
                        resolve(value);
                    };
                    confirmBtn.addEventListener('click', () => closeModal(inputField ? inputField.value : true));
                    if (cancelBtn) cancelBtn.addEventListener('click', () => closeModal(inputField ? null : false));
                    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(inputField ? null : false); });
                    if (inputField) {
                        inputField.addEventListener('keypress', (e) => { if (e.key === 'Enter') closeModal(inputField.value); });
                        setTimeout(() => inputField.focus(), 100);
                    }
                });
            }

            function escapeHtml(text) {
                return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
            }

            addBtn.addEventListener('click', addTask);
            taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });
            clearCompletedBtn.addEventListener('click', clearCompleted);
            exportBtn.addEventListener('click', exportTasksToTXT);
            exportJsonBtn.addEventListener('click', exportTasksToJSON);
            importJsonBtn.addEventListener('click', () => importJsonInput.click());
            importJsonInput.addEventListener('change', importTasksFromJSON);
            prevMonthBtn.addEventListener('click', () => { currentCalDate.setMonth(currentCalDate.getMonth() - 1); renderCalendar(); });
            nextMonthBtn.addEventListener('click', () => { currentCalDate.setMonth(currentCalDate.getMonth() + 1); renderCalendar(); });
            themeToggle.addEventListener('click', () => { isLightMode = !isLightMode; if (isLightMode) enableLightMode(); else disableLightMode(); });
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentStatusFilter = btn.getAttribute('data-filter');
                    renderAll();
                });
            });
            categoryFilter.addEventListener('change', (e) => { currentCatFilter = e.target.value; renderAll(); });

            function addTask() {
                const text = taskInput.value.trim();
                if (text === '') return;
                const newTask = { id: Date.now(), text, completed: false, priority: taskPriority.value, category: taskCategory.value, date: taskDate.value };
                tasks.unshift(newTask);
                saveAndRender();
                taskInput.value = '';
                taskInput.focus();
            }

            function deleteTask(id) {
                const taskElement = document.getElementById(`task-${id}`);
                if(taskElement) {
                    taskElement.style.animation = 'fadeOut 0.2s ease forwards';
                    setTimeout(() => { tasks = tasks.filter(task => task.id !== id); saveAndRender(); }, 200);
                } else {
                    tasks = tasks.filter(task => task.id !== id);
                    saveAndRender();
                }
            }

            async function editTask(id) {
                const task = tasks.find(t => t.id === id);
                if (!task) return;
                const newText = await showModal({ icon: 'edit', title: 'تعديل المهمة', message: 'قم بتعديل نص المهمة أدناه:', input: true, inputValue: task.text, confirmText: 'حفظ', showCancel: true, type: 'primary' });
                if (newText !== null && newText.trim() !== "") { task.text = newText.trim(); saveAndRender(); }
            }

            function toggleTask(id) {
                tasks = tasks.map(task => {
                    if(task.id === id) {
                        if(!task.completed) { successSound.currentTime = 0; successSound.play().catch(e => console.log("Sound error")); }
                        return { ...task, completed: !task.completed };
                    }
                    return task;
                });
                saveAndRender();
            }

            function clearCompleted() { tasks = tasks.filter(task => !task.completed); saveAndRender(); }

            async function exportTasksToTXT() {
                if (tasks.length === 0) { await showModal({ icon: 'warning', title: 'تنبيه', message: 'لا توجد مهام لتصديرها!' }); return; }
                const catNames = { work: 'عمل', personal: 'شخصي', study: 'دراسة', shopping: 'تسوق' };
                const prioNames = { high: 'عالية', medium: 'متوسطة', low: 'عادية' };
                let content = "قائمة مهامي اليومية\n====================\n\n";
                tasks.forEach((t, index) => { const status = t.completed ? "[منجزة]  " : "[قيد التنفيذ]"; const dateText = t.date ? ` | تاريخ: ${t.date}` : ''; content += `${index + 1}. ${status} ${t.text} (تصنيف: ${catNames[t.category] || 'شخصي'} | أولوية: ${prioNames[t.priority] || 'عادية'}${dateText})\n`; });
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' }); downloadBlob(blob, 'My_Tasks.txt');
            }

            async function exportTasksToJSON() {
                if (tasks.length === 0) { await showModal({ icon: 'warning', title: 'تنبيه', message: 'لا توجد مهام لتصديرها!' }); return; }
                const dataStr = JSON.stringify(tasks, null, 2); const blob = new Blob([dataStr], { type: 'application/json' }); downloadBlob(blob, 'My_Tasks_Backup.json');
            }

            async function importTasksFromJSON(event) {
                const file = event.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const importedTasks = JSON.parse(e.target.result);
                        if (Array.isArray(importedTasks)) { const existingIds = new Set(tasks.map(t => t.id)); let addedCount = 0; importedTasks.forEach(t => { if (!existingIds.has(t.id)) { tasks.push(t); existingIds.add(t.id); addedCount++; } }); saveAndRender(); await showModal({ icon: 'success', title: 'تم الاستيراد', message: `تم استيراد ${addedCount} مهمة جديدة بنجاح!` }); }
                        else { await showModal({ icon: 'warning', title: 'خطأ', message: 'ملف JSON غير صالح.' }); }
                    } catch (error) { await showModal({ icon: 'warning', title: 'خطأ', message: 'ملف JSON غير صحيح.' }); }
                    importJsonInput.value = '';
                };
                reader.readAsText(file);
            }

            function downloadBlob(blob, filename) { const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url); }

            function saveAndRender() { localStorage.setItem('my_tasks_calendar', JSON.stringify(tasks)); renderAll(); }

            function renderAll() { renderTasks(); renderCalendar(); }

            function renderTasks() {
                taskList.innerHTML = '';
                let filteredTasks = tasks.filter(task => { const matchStatus = currentStatusFilter === 'all' || (currentStatusFilter === 'pending' && !task.completed) || (currentStatusFilter === 'completed' && task.completed); const matchCat = currentCatFilter === 'all' || task.category === currentCatFilter; return matchStatus && matchCat; });
                if (filteredTasks.length === 0) { taskList.innerHTML = `<div class="empty-state"><i class="fa-regular fa-folder-open"></i><p>لا توجد مهام هنا!</p></div>`; }
                else {
                    const catDetails = { work: { name: 'عمل', icon: '💼' }, personal: { name: 'شخصي', icon: '👤' }, study: { name: 'دراسة', icon: '🎓' }, shopping: { name: 'تسوق', icon: '🛒' } };
                    filteredTasks.forEach(task => {
                        const li = document.createElement('li'); li.className = `task-item priority-${task.priority} ${task.completed ? 'completed' : ''}`; li.id = `task-${task.id}`; li.setAttribute('draggable', 'true');
                        let dateHtml = task.date ? `<span class="task-date"><i class="far fa-calendar-alt"></i> ${task.date}</span>` : '';
                        let catInfo = catDetails[task.category] || catDetails['personal']; let catHtml = `<span class="cat-badge badge-${task.category}">${catInfo.icon} ${catInfo.name}</span>`;
                        li.innerHTML = `<div class="task-content" onclick="window.toggleTaskExternal(${task.id})"><div class="task-text">${escapeHtml(task.text)}</div><div class="task-meta">${catHtml}${dateHtml}</div></div><div class="action-btns"><button class="action-btn edit-btn" onclick="window.editTaskExternal(${task.id})" title="تعديل"><i class="fas fa-pen"></i></button><button class="action-btn delete-btn" onclick="window.deleteTaskExternal(${task.id})" title="حذف"><i class="fas fa-trash-alt"></i></button></div>`;
                        addDragAndDropEvents(li); taskList.appendChild(li);
                    });
                }
                updateStats();
            }

            function renderCalendar() {
                while (calendarGrid.children.length > 7) calendarGrid.removeChild(calendarGrid.lastChild);
                const year = currentCalDate.getFullYear(); const month = currentCalDate.getMonth();
                const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
                monthYearText.textContent = `${monthNames[month]} ${year}`;
                const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate();
                for (let i = 0; i < firstDay; i++) { const emptyCell = document.createElement('div'); emptyCell.className = 'day-cell empty'; calendarGrid.appendChild(emptyCell); }
                const today = new Date(); const catColors = { work: 'var(--cat-work)', personal: 'var(--cat-personal)', study: 'var(--cat-study)', shopping: 'var(--cat-shopping)' };
                for (let day = 1; day <= daysInMonth; day++) {
                    const cell = document.createElement('div'); cell.className = 'day-cell';
                    if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) cell.classList.add('today');
                    const dayNumber = document.createElement('div'); dayNumber.className = 'day-number'; dayNumber.textContent = day; cell.appendChild(dayNumber);
                    const cellDateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const dayTasks = tasks.filter(t => t.date === cellDateString);
                    dayTasks.forEach(task => { const taskBadge = document.createElement('div'); taskBadge.className = `calendar-task ${task.completed ? 'completed' : ''}`; taskBadge.textContent = task.text; taskBadge.title = task.text; taskBadge.style.backgroundColor = catColors[task.category] || 'var(--primary-color)'; taskBadge.addEventListener('click', (e) => { e.stopPropagation(); toggleTask(task.id); }); cell.appendChild(taskBadge); });
                    calendarGrid.appendChild(cell);
                }
            }

            function addDragAndDropEvents(item) { item.addEventListener('dragstart', () => setTimeout(() => item.classList.add('dragging'), 0)); item.addEventListener('dragend', () => { item.classList.remove('dragging'); saveNewOrder(); }); }
            taskList.addEventListener('dragover', (e) => { e.preventDefault(); const draggingItem = document.querySelector('.dragging'); if(!draggingItem) return; const siblings = [...taskList.querySelectorAll('.task-item:not(.dragging)')]; let nextSibling = siblings.find(sibling => e.clientY <= sibling.getBoundingClientRect().top + sibling.getBoundingClientRect().height / 2); taskList.insertBefore(draggingItem, nextSibling); });
            function saveNewOrder() { const currentIds = [...taskList.querySelectorAll('.task-item')].map(li => parseInt(li.id.replace('task-', ''))); const taskMap = new Map(tasks.map(t => [t.id, t])); const reorderedVisible = currentIds.map(id => taskMap.get(id)); let visibleIdx = 0; tasks = tasks.map(t => currentIds.includes(t.id) ? reorderedVisible[visibleIdx++] : t); localStorage.setItem('my_tasks_calendar', JSON.stringify(tasks)); }

            function updateStats() { const total = tasks.length; const completed = tasks.filter(t => t.completed).length; taskCount.innerText = `المهام: ${completed} / ${total}`; clearCompletedBtn.style.display = completed > 0 ? 'inline-flex' : 'none'; const progressPercentage = total === 0 ? 0 : Math.round((completed / total) * 100); progressFill.style.width = `${progressPercentage}%`; progressText.innerText = `${progressPercentage}%`; progressFill.style.background = (progressPercentage === 100 && total > 0) ? '#3b82f6' : 'var(--accent-green)'; }

            window.toggleTaskExternal = toggleTask;
            window.editTaskExternal = editTask;
            window.deleteTaskExternal = deleteTask;

            renderAll();
        })();
    </script>
     <script>
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) || (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) || (e.ctrlKey && (e.key === 'U' || e.key === 'u')) || (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) || (e.ctrlKey && e.shiftKey && (e.key === 'K' || e.key === 'k')) || (e.ctrlKey && e.shiftKey && (e.key === 'E' || e.key === 'e'))) {
                e.preventDefault();
            }
        });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); });
    </script>
